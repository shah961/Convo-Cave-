{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 relative bg-goDark overflow-hidden">
    <!-- Animated Orbs -->
    <div id="orb-login" class="absolute w-[300px] h-[300px] rounded-full bg-goLime opacity-10 blur-[100px] pointer-events-none top-1/4 left-1/4"></div>

    <div class="bg-goCard border border-white/5 rounded-[2rem] p-10 max-w-md w-full shadow-2xl z-10 opacity-0" id="login-card">
        <div class="text-center mb-10 flex flex-col items-center">
            <img src="/static/logo.png" alt="Convo Go Logo" class="h-16 w-auto mb-6 logo-glow">
            <h2 class="text-3xl font-black tracking-tighter text-white uppercase">Access <span class="text-goLime">Go</span></h2>
            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mt-2">Authentication Protocol Required</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] font-black uppercase tracking-widest px-4 py-3 rounded-xl mb-6 text-center">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Core Authentication Form -->
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-2 ml-1">Email</label>
                <input type="text" name="username" placeholder="EMAIL ADDRESS" required class="w-full bg-goDark border border-white/5 rounded-2xl px-5 py-4 text-xs font-bold focus:outline-none focus:border-goLime/50 text-gray-200 transition-all placeholder:text-gray-700">
            </div>
            <div class="relative">
                <div class="flex justify-between items-center mb-2 ml-1">
                    <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">Security Key</label>
                </div>
                <input type="password" id="password-field" name="password" placeholder="••••••••" required class="w-full bg-goDark border border-white/5 rounded-2xl px-5 py-4 text-xs font-bold focus:outline-none focus:border-goLime/50 text-gray-200 transition-all placeholder:text-gray-700">
                <button type="button" id="password-toggle" class="absolute right-5 bottom-4.5 text-[10px] font-black uppercase tracking-widest text-gray-600 hover:text-goLime transition-colors">Show</button>
            </div>

            <button type="submit" class="w-full py-5 rounded-2xl bg-white text-goDark font-black text-xs uppercase tracking-[0.2em] hover:bg-goLime transition-all shadow-[0_0_20px_rgba(255,255,255,0.05)]">
                Initialize Session
            </button>
        </form>

        <div class="mt-10 text-center space-y-4">
            <p class="text-[10px] font-black uppercase tracking-widest text-gray-600">
                New user? <a href="/signup" class="text-goLime hover:underline">Initialize Account</a>
            </p>
            <a href="/" class="inline-block text-[10px] font-black uppercase tracking-[0.3em] text-gray-700 hover:text-goLime transition-colors">← Back to Terminal</a>
        </div>
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        gsap.to("#orb-login", { x: 50, y: 30, duration: 6, repeat: -1, yoyo: true, ease: "sine.inOut" });
        gsap.to("#login-card", { opacity: 1, y: 0, duration: 1, ease: "expo.out" });

        const passField = document.getElementById('password-field');
        const passToggle = document.getElementById('password-toggle');

        passToggle.addEventListener('click', () => {
            if (passField.type === 'password') {
                passField.type = 'text';
                passToggle.textContent = 'Hide';
            } else {
                passField.type = 'password';
                passToggle.textContent = 'Show';
            }
        });
    });
</script>
{% endblock %}
