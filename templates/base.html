<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convo Go</title>
    <!-- Favicon Integration using your custom logo -->
    <link rel="icon" href="/static/logo.png" type="image/png">

    <!-- Tailwind CSS for modern layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        goDark: '#050505',
                        goMidnight: '#0f0f0f',
                        goCard: '#1a1a1a',
                        goLime: '#ccff00',
                        goGray: '#2a2a2a'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ccff00; }

        /* Custom Logo Neon Glow and Transition Effects */
        .logo-glow {
            filter: drop-shadow(0 0 8px rgba(204, 255, 0, 0.2));
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo-glow:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px rgba(204, 255, 0, 0.5));
        }

        .text-glow-lime {
            text-shadow: 0 0 10px rgba(204, 255, 0, 0.5);
        }
    </style>
</head>
<body class="bg-goDark text-gray-100 min-h-screen flex flex-col selection:bg-goLime selection:text-goDark">
    {% block content %}{% endblock %}
</body>
</html>
